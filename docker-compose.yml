services:
  db:
    image: postgres:15-alpine
    container_name: safeguard_db
    environment:
      POSTGRES_USER: admin
      POSTGRES_PASSWORD: safeguard
      POSTGRES_DB: safeguard
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U admin -d safeguard"]
      interval: 5s
      timeout: 5s
      retries: 5

  backend:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: safeguard_backend
    environment:
      DATABASE_URL: postgresql+asyncpg://admin:safeguard@db:5432/safeguard
    ports:
      - "8000:8000"
    depends_on:
      db:
        condition: service_healthy
    volumes:
      - ./audits:/app/audits

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: safeguard_frontend
    ports:
      - "80:80"
    depends_on:
      - backend

volumes:
  postgres_data:
